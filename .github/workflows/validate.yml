name: Validate

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ".[all]"
          pip install pytest pytest-timeout

      - name: Run CI validation (L1 + L2)
        run: |
          bash validation/ci-check.sh

      - name: Check for regressions (if snapshot exists)
        if: github.event_name == 'pull_request'
        run: |
          if [ -f benchmarks/latest.json ]; then
            export BENCHMARK_AGAINST="$PWD/benchmarks/latest.json"
            bash validation/ci-check.sh
          fi

      - name: Comment PR with summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            let body = '## 📊 Validation Results\n\n';
            body += '### L1: Tests\n';
            body += '✅ All tests passed\n\n';
            body += '### L2: Fixture Graph\n';
            body += '✅ Fixture graph built successfully\n';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
